spring.application.name=memories-api
server.port=9090
server.tomcat.connection-timeout=60000

spring.security.user.name=admin
spring.security.user.password=admin

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# H2 Database Configuration
# Update path or set to different DB configuration
spring.datasource.url=${DATASOURCE_URL:jdbc:h2:file:./data/db/memories.db}
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${DATASOURCE_USERNAME:sa}
spring.datasource.password=${DATASOURCE_PASSWORD:password}

# Hibernate Configuration (JPA)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:FALSE}
spring.h2.console.path=/h2-console

# Enable logging for SQL queries
logging.level.org.hibernate.SQL=${SQL_LOGGING_LEVEL:DEBUG}
logging.level.org.hibernate.type.descriptor.sql=${SQL_TYPE_DESCRIPTOR:TRACE}

# App properties
app.jwt.secret=${JWT_SECRET:szNjWVZXMoDDgH1Xl7N9dyWZYgMn3TXhbeDoCIwjFzY=}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
image.path=${IMAGE_PATH:/data/memories-img}
image.thumbnail-path=${IMAGE_THUMBNAIL_PATH:/data/memories-img/th}
image.allowed-formats=${IMAGE_ALLOWED_FORMATS:jpg|jpeg|png|gif|bmp|webp}
image.resize-images=${IMAGE_RESIZE_IMAGES:true}
image.max-size=${IMAGE_MAX_SIZE:2048}
image.thumb-size=${IMAGE_THUMB_SIZE:320}
app.broadcast-posts=${APP_BROADCAST_POSTS:false}
video.path=${VIDEO_PATH:/data/memories-vid}
video.thumbnail-path=${VIDEO_THUMBNAIL_PATH:/data/memories-vid/th}
video.allowed-formats=${VIDEO_ALLOWED_FORMATS:mp4}

# Email
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:25}
spring.mail.username=${MAIL_USERNAME:user}
spring.mail.password=${MAIL_PASSWORD:password}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_CONNECTION_TIMEOUT:60000}
spring.mail.properties.mail.smtp.timeout=${MAIL_TIMEOUT:30000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_WRITE_TIMEOUT:60000}

# APNS Configuration
app.push-enabled=${APP_ENABLE_PUSH:false}
apns.key-id=${APNS_KEY_ID:null}
apns.team-id=${APNS_TEAM_ID:null}
apns.bundle-id=${APNS_BUNDLE_ID:null}
apns.private-key-base64=${APNS_PRIVATE_KEY_BASE64:null}
apns.production=${APNS_PRODUCTION:false}

# Password reset
app.mail.from=${MAIL_FROM:no-reply@example.com}
app.password-reset.base-url=${PASSWORD_RESET_BASE_URL:http://localhost:3000/reset-password}
app.password-reset.cleanup-cron=${PASSWORD_RESET_CLEANUP_CRON:0 15 3 * * *}

# TODO
app.broadcast-joiners=true
app.enable-web=false